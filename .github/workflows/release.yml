name: Build and Release dub

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    name: Cross-Compile and Upload
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Create Build Directories
        run: mkdir -p release/mac-arm64 release/mac-amd64 release/windows release/linux

      - name: Download yt-dlp binaries
        run: |
          curl -sL https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp_macos -o release/mac-arm64/yt-dlp
          cp release/mac-arm64/yt-dlp release/mac-amd64/yt-dlp
          curl -sL https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp.exe -o release/windows/yt-dlp.exe
          curl -sL https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp_linux -o release/linux/yt-dlp
          chmod +x release/mac-arm64/yt-dlp release/mac-amd64/yt-dlp release/linux/yt-dlp

      - name: Compile Go Code
        run: |
          # Mac (Apple Silicon)
          GOOS=darwin GOARCH=arm64 go build -o release/mac-arm64/dub .

          # Mac (Intel)
          GOOS=darwin GOARCH=amd64 go build -o release/mac-amd64/dub .

          # Windows
          GOOS=windows GOARCH=amd64 go build -o release/windows/dub.exe .

          # Linux
          GOOS=linux GOARCH=amd64 go build -o release/linux/dub .

      - name: Copy README to packages
        run: |
          cp README.md release/mac-arm64/
          cp README.md release/mac-amd64/
          cp README.md release/windows/
          cp README.md release/linux/

      - name: Zip Packages
        run: |
          cd release
          zip -j dub-Mac-Apple-Silicon.zip mac-arm64/*
          zip -j dub-Mac-Intel.zip mac-amd64/*
          zip -j dub-Windows.zip windows/*
          zip -j dub-Linux.zip linux/*

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/dub-Mac-Apple-Silicon.zip
            release/dub-Mac-Intel.zip
            release/dub-Windows.zip
            release/dub-Linux.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}